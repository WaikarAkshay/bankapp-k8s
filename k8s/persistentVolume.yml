apiVersion: v1
kind: PersistentVolume
metadata:
  name: bankapp-pv
  labels:
    app: mysql
spec:
  storageClassName: manual
  capacity:
    storage: 5Gi
  accessmode:
    - ReadWriteOnce
  hostPath: /mnt/data/mysql

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-pv
  labels:
    app: ollama
spec:
  storageClassName: manual
  capacity:
    storage: 5Gi
  accessmode:
    - ReadWriteOnce
  hostPath: /mnt/data/ollama