apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: bankapp-ns
  name: bankapp-deployment
  labels:
    app: bankapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bankapp
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MySQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: bankapp-cm
              key: MySQL_DATABASE
        - name: MySQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bankapp-secret
              key: MySQL_ROOT_PASSWORD
              